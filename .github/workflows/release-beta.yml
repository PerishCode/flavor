name: release-beta

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Beta version tag, for example v0.1.0-beta.1"
        required: true
        type: string
      ref:
        description: "Git ref to release from"
        required: true
        default: main
        type: string

permissions:
  contents: read

concurrency:
  group: flavor-release-beta
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FLAVOR_RELEASES_PUBLIC_URL: ${{ vars.FLAVOR_RELEASES_PUBLIC_URL }}
      FLAVOR_RELEASES_S3_AK: ${{ secrets.FLAVOR_RELEASES_S3_AK }}
      FLAVOR_RELEASES_S3_BUCKET: ${{ secrets.FLAVOR_RELEASES_S3_BUCKET }}
      FLAVOR_RELEASES_S3_SK: ${{ secrets.FLAVOR_RELEASES_S3_SK }}
      FLAVOR_RELEASES_S3_URL: ${{ secrets.FLAVOR_RELEASES_S3_URL }}
      R2_ACCESS_PROBE_NAME: release-beta
      RELEASE_CHANNEL: beta
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Validate beta version
        run: |
          set -euo pipefail
          case "${{ inputs.version }}" in
            v*-beta.*) ;;
            *)
              echo "beta version must look like vX.Y.Z-beta.N" >&2
              exit 1
              ;;
          esac
          beta_base_version=$(printf '%s\n' "${{ inputs.version }}" | sed -n 's/^v\([0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\)-beta\.[0-9][0-9]*$/\1/p')
          cargo_version=$(sed -n 's/^version = "\(.*\)"$/\1/p' app/Cargo.toml | head -n 1)
          [ "$cargo_version" = "$beta_base_version" ] || {
            printf 'version mismatch: Cargo.toml=%s beta base=%s\n' "$cargo_version" "$beta_base_version" >&2
            exit 1
          }

      - name: Validate R2 access
        run: bash .github/scripts/release/r2/check.sh

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: flavor-x86_64-unknown-linux-gnu.tar.gz
          - runner: macos-latest
            target: aarch64-apple-darwin
            archive: flavor-aarch64-apple-darwin.tar.gz
          - runner: macos-latest
            target: x86_64-apple-darwin
            archive: flavor-x86_64-apple-darwin.tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: flavor-x86_64-pc-windows-msvc.zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Package release artifact
        if: runner.os != 'Windows'
        env:
          TARGET: ${{ matrix.target }}
        run: sh .github/scripts/release/assets/package.sh "${{ inputs.version }}"

      - name: Package release artifact
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
        run: ./.github/scripts/release/assets/package.ps1 "${{ inputs.version }}"

      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: dist/${{ inputs.version }}/${{ matrix.archive }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    env:
      FLAVOR_RELEASES_PUBLIC_URL: ${{ vars.FLAVOR_RELEASES_PUBLIC_URL }}
      FLAVOR_RELEASES_S3_AK: ${{ secrets.FLAVOR_RELEASES_S3_AK }}
      FLAVOR_RELEASES_S3_BUCKET: ${{ secrets.FLAVOR_RELEASES_S3_BUCKET }}
      FLAVOR_RELEASES_S3_SK: ${{ secrets.FLAVOR_RELEASES_S3_SK }}
      FLAVOR_RELEASES_S3_URL: ${{ secrets.FLAVOR_RELEASES_S3_URL }}
      RELEASE_CHANNEL: beta
      RELEASE_ROOT: dist/${{ inputs.version }}
      RELEASE_VERSION: ${{ inputs.version }}
    outputs:
      metadata_url: ${{ steps.r2.outputs.metadata_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/download-artifact@v8
        with:
          path: dist/${{ inputs.version }}
          merge-multiple: true

      - name: Create checksums
        run: sh .github/scripts/release/assets/checksums.sh "${{ inputs.version }}" "dist/${{ inputs.version }}"

      - name: Accept release assets
        run: sh .github/scripts/release/assets/verify.sh accept "${{ inputs.version }}" "dist/${{ inputs.version }}"

      - name: Verify release archives
        run: sh .github/scripts/release/assets/verify.sh verify "${{ inputs.version }}" "dist/${{ inputs.version }}"

      - name: Publish to R2
        id: r2
        run: bash .github/scripts/release/r2/publish.sh

      - name: Verify R2 publish
        env:
          R2_METADATA_URL: ${{ steps.r2.outputs.metadata_url }}
        run: bash .github/scripts/release/r2/verify.sh

  smoke:
    needs: publish
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      FLAVOR_RELEASES_PUBLIC_URL: ${{ vars.FLAVOR_RELEASES_PUBLIC_URL }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Smoke beta install on Unix
        if: runner.os != 'Windows'
        run: sh .github/scripts/release/smoke/smoke.sh "${{ inputs.version }}" beta

      - name: Smoke beta install on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./.github/scripts/release/smoke/smoke.ps1 "${{ inputs.version }}" beta
