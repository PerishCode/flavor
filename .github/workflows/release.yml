name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: flavor-release-stable
  cancel-in-progress: false

jobs:
  validate:
    if: ${{ !contains(github.ref_name, '-beta.') }}
    runs-on: ubuntu-latest
    env:
      FLAVOR_RELEASES_PUBLIC_URL: ${{ vars.FLAVOR_RELEASES_PUBLIC_URL }}
      FLAVOR_RELEASES_S3_AK: ${{ secrets.FLAVOR_RELEASES_S3_AK }}
      FLAVOR_RELEASES_S3_BUCKET: ${{ secrets.FLAVOR_RELEASES_S3_BUCKET }}
      FLAVOR_RELEASES_S3_SK: ${{ secrets.FLAVOR_RELEASES_S3_SK }}
      FLAVOR_RELEASES_S3_URL: ${{ secrets.FLAVOR_RELEASES_S3_URL }}
      R2_ACCESS_PROBE_NAME: release-stable
      RELEASE_CHANNEL: stable
    steps:
      - uses: actions/checkout@v6

      - name: Validate stable version
        run: |
          set -euo pipefail
          cargo_version=$(sed -n 's/^version = "\(.*\)"$/\1/p' app/Cargo.toml | head -n 1)
          [ "v$cargo_version" = "${GITHUB_REF_NAME}" ] || {
            printf 'version mismatch: Cargo.toml=%s tag=%s\n' "v$cargo_version" "${GITHUB_REF_NAME}" >&2
            exit 1
          }

      - name: Validate R2 access
        run: bash .github/scripts/release/r2/check.sh

  build:
    if: ${{ !contains(github.ref_name, '-beta.') }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: flavor-x86_64-unknown-linux-gnu.tar.gz
          - runner: macos-latest
            target: aarch64-apple-darwin
            archive: flavor-aarch64-apple-darwin.tar.gz
          - runner: macos-latest
            target: x86_64-apple-darwin
            archive: flavor-x86_64-apple-darwin.tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: flavor-x86_64-pc-windows-msvc.zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Package release artifact
        if: runner.os != 'Windows'
        env:
          TARGET: ${{ matrix.target }}
        run: sh .github/scripts/release/assets/package.sh "${GITHUB_REF_NAME}"

      - name: Package release artifact
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
        run: ./.github/scripts/release/assets/package.ps1 "${env:GITHUB_REF_NAME}"

      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: dist/${{ github.ref_name }}/${{ matrix.archive }}

  publish:
    if: ${{ !contains(github.ref_name, '-beta.') }}
    needs: build
    runs-on: ubuntu-latest
    env:
      FLAVOR_RELEASES_PUBLIC_URL: ${{ vars.FLAVOR_RELEASES_PUBLIC_URL }}
      FLAVOR_RELEASES_S3_AK: ${{ secrets.FLAVOR_RELEASES_S3_AK }}
      FLAVOR_RELEASES_S3_BUCKET: ${{ secrets.FLAVOR_RELEASES_S3_BUCKET }}
      FLAVOR_RELEASES_S3_SK: ${{ secrets.FLAVOR_RELEASES_S3_SK }}
      FLAVOR_RELEASES_S3_URL: ${{ secrets.FLAVOR_RELEASES_S3_URL }}
      RELEASE_CHANNEL: stable
      RELEASE_ROOT: dist/${{ github.ref_name }}
      RELEASE_VERSION: ${{ github.ref_name }}
    outputs:
      metadata_url: ${{ steps.r2.outputs.metadata_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: dist/${{ github.ref_name }}
          merge-multiple: true

      - name: Create checksums
        run: sh .github/scripts/release/assets/checksums.sh "${GITHUB_REF_NAME}" "dist/${GITHUB_REF_NAME}"

      - name: Accept release assets
        run: sh .github/scripts/release/assets/verify.sh accept "${GITHUB_REF_NAME}" "dist/${GITHUB_REF_NAME}"

      - name: Verify release archives
        run: sh .github/scripts/release/assets/verify.sh verify "${GITHUB_REF_NAME}" "dist/${GITHUB_REF_NAME}"

      - name: Publish to R2
        id: r2
        run: bash .github/scripts/release/r2/publish.sh

      - name: Verify R2 publish
        env:
          R2_METADATA_URL: ${{ steps.r2.outputs.metadata_url }}
        run: bash .github/scripts/release/r2/verify.sh

  smoke:
    if: ${{ !contains(github.ref_name, '-beta.') }}
    needs: publish
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      FLAVOR_RELEASES_PUBLIC_URL: ${{ vars.FLAVOR_RELEASES_PUBLIC_URL }}
    steps:
      - uses: actions/checkout@v6

      - name: Smoke stable install on Unix
        if: runner.os != 'Windows'
        run: sh .github/scripts/release/smoke/smoke.sh "${GITHUB_REF_NAME}" stable

      - name: Smoke stable install on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./.github/scripts/release/smoke/smoke.ps1 "${env:GITHUB_REF_NAME}" stable
